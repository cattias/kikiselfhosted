apiVersion: batch/v1
kind: CronJob
metadata:
  name: nextcloud-data-backup
  namespace: documents
spec:
  # Schedule: Run every night at 03:00 AM (UTC)
  schedule: "5 1 * * *"
  # If the job fails, retry up to 1 time
  failedJobsHistoryLimit: 1
  # Keep 1 successful job history
  successfulJobsHistoryLimit: 1
  # Concurrency Policy: Prevents a new job from starting if the previous one is still running.
  concurrencyPolicy: Forbid 
  # The actual job template
  jobTemplate:
    spec:
      template:
        spec:
          # Use a Pod that is suitable for file operations
          containers:
            - name: rsync-backup
              # rsync is a standard tool for efficient, incremental backups
              image: instrumentisto/rsync-ssh:latest 
              imagePullPolicy: Always
              
              command: ["/bin/sh", "-c"]
              args:
                - |
                  echo "Starting Backup..."
                  # Create timestamped folder or sync to 'latest'
                  DEST="/mnt/destination/documents/nextcloud_documents"
                  mkdir -p $DEST
                  
                  # Syncing specific folders
                  # -rlptgo: recursive, links, perms, times, group, owner
                  # --ignore-errors: continue even if a log file is locked
                  rsync -rltv --delete --ignore-errors \
                    /mnt/source \
                    $DEST/
                  
                  echo "Backup complete at $(date)"
              volumeMounts:
                # 1. Source: Nextcloud's persistent config (PVC)
                - name: nextcloud-source-volume
                  mountPath: /mnt/source
                  readOnly: true
                # 2. Destination: Backup PV (NFS)
                - name: backup-volume
                  mountPath: /mnt/destination
          restartPolicy: OnFailure

          volumes:
            # 1. Source Volume (The data you want to backup)
            - name: nextcloud-source-volume
              persistentVolumeClaim:
                claimName: nextcloud-documents-pvc
            # 2. Destination Volume (The NFS mount)
            - name: backup-volume
              persistentVolumeClaim:
                claimName: paperless-backup-pvc