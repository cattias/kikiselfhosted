apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: nextcloud-daily-backup
  namespace: documents
spec:
  immediate: true
  schedule: "0 5 1 * * *"
  backupOwnerReference: self
  target: prefer-standby
  cluster:
    name: nextcloud-db
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io